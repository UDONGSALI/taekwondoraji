<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{gym/fragments/layout :: layout('포인트 아이템 관리', 'pointiteminfo', ${gymId}, ~{::pointItemInfoContent})}">
<th:block th:fragment="pointItemInfoContent">
    <link rel="stylesheet" th:href="@{/css/admin/goal/common.css(v='7')}">

    <script th:if="${toastMessage != null}" th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof window.toastMsg === "function") {
                window.toastMsg([[${toastMessage}]], [[${toastType != null ? toastType : 'success'}]]);
            }
        });
    </script>

    <section class="content-panel panel-emphasis">
        <div class="panel-header">
            <h2>포인트 아이템 등록</h2>
        </div>

        <form class="goal-create-form"
              th:action="@{/gym/{gymId}/point-item(gymId=${gymId})}"
              th:object="${pointItemCreateForm}"
              method="post"
              enctype="multipart/form-data">
            <div class="point-item-create-grid">
                <label class="goal-field point-item-name">
                    <span>아이템 이름</span>
                    <input type="text" th:field="*{name}" placeholder="아이템 이름">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">오류</small>
                </label>

                <label class="goal-field point-item-point">
                    <span>사용 포인트</span>
                    <input type="number" th:field="*{point}" min="0" placeholder="0">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('point')}" th:errors="*{point}">오류</small>
                </label>

                <label class="goal-field point-item-status">
                    <span>상태</span>
                    <select th:field="*{itemStatus}">
                        <option th:each="status : ${itemStatuses}"
                                th:value="${status.name()}"
                                th:text="${status.label}">
                            판매
                        </option>
                    </select>
                    <small class="goal-field-error" th:if="${#fields.hasErrors('itemStatus')}" th:errors="*{itemStatus}">오류</small>
                </label>

                <label class="goal-field point-item-image-field">
                    <span>이미지</span>
                    <input id="pointItemImageFile"
                           class="point-item-file-input"
                           type="file"
                           name="imageFile"
                           accept="image/png,image/jpeg,image/webp">
                    <label class="point-item-file-button" for="pointItemImageFile">파일 선택</label>
                </label>

                <label class="goal-field point-item-description">
                    <span>설명</span>
                    <input type="text" th:field="*{description}" placeholder="아이템 설명">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">오류</small>
                </label>

                <label class="goal-field point-item-link">
                    <span>설명 링크</span>
                    <input type="text" th:field="*{link}" placeholder="https://example.com">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('link')}" th:errors="*{link}">오류</small>
                </label>

                <div class="goal-field-action point-item-action">
                    <button type="submit">입력</button>
                </div>
            </div>
        </form>
    </section>

    <section class="content-panel panel-emphasis">
        <div class="panel-header">
            <h2>포인트 아이템 목록</h2>
        </div>

        <div class="summary-box">
            <table class="goal-table">
                <thead>
                <tr>
                    <th>No</th>
                    <th>이미지</th>
                    <th>이름</th>
                    <th>포인트</th>
                    <th>상태</th>
                    <th>설명</th>
                    <th>링크</th>
                    <th>생성일시</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${pointItemInfo.items}">
                    <td th:text="${item.no}">1</td>
                    <td>
                        <img th:if="${item.imageUrl != null}"
                             th:src="${item.imageUrl}"
                             alt=""
                             class="point-item-thumb">
                        <span th:if="${item.imageUrl == null}" class="point-item-empty-thumb">-</span>
                    </td>
                    <td th:text="${item.name}">아이템명</td>
                    <td th:text="${item.point}">100</td>
                    <td>
                        <form th:action="@{/gym/{gymId}/point-item/{pointItemId}/status(gymId=${gymId}, pointItemId=${item.gymPointItemId})}"
                              method="post">
                            <select name="itemStatus"
                                    class="member-status-select point-item-list-status-select"
                                    onchange="this.form.submit()">
                                <option th:each="status : ${itemStatuses}"
                                        th:value="${status.name()}"
                                        th:selected="${status.name() == item.itemStatusCode}"
                                        th:text="${status.label}">
                                    판매
                                </option>
                            </select>
                        </form>
                    </td>
                    <td th:text="${item.description != null and !#strings.isEmpty(item.description) ? item.description : '-'}">설명</td>
                    <td>
                        <a th:if="${item.link != null and !#strings.isEmpty(item.link)}"
                           th:href="${item.link}"
                           target="_blank"
                           rel="noopener noreferrer"
                           class="goal-link">
                            보기
                        </a>
                        <span th:if="${item.link == null or #strings.isEmpty(item.link)}">-</span>
                    </td>
                    <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-17 00:00</td>
                    <td>
                        <form th:action="@{/gym/{gymId}/point-item/{pointItemId}/delete(gymId=${gymId}, pointItemId=${item.gymPointItemId})}"
                              method="post">
                            <button type="submit" class="goal-delete-button">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pointItemInfo.items)}">
                    <td colspan="9">등록된 포인트 아이템이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="content-panel panel-emphasis">
        <div class="panel-header">
            <h2>회원 구매 요청</h2>
        </div>

        <div class="summary-box">
            <table class="goal-table">
                <thead>
                <tr>
                    <th>No</th>
                    <th>회원</th>
                    <th>회원 상태</th>
                    <th>띠</th>
                    <th>아이템</th>
                    <th>포인트</th>
                    <th>아이템 상태</th>
                    <th>구매일시</th>
                    <th>사용일시</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member : ${pointItemInfo.members}">
                    <td th:text="${member.no}">1</td>
                    <td th:text="${member.memberName}">회원명</td>
                    <td th:text="${member.memberStatus}">서비스 중</td>
                    <td th:text="${member.beltLabel}">흰띠</td>
                    <td th:text="${member.itemName}">아이템명</td>
                    <td th:text="${member.point}">100</td>
                    <td>
                        <span class="goal-status-badge"
                              th:classappend="| is-${member.itemStatusCode}|"
                              th:text="${member.itemStatus}">
                            보유
                        </span>
                    </td>
                    <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-17 00:00</td>
                    <td th:text="${member.usedAt != null ? #temporals.format(member.usedAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                </tr>
                <tr th:if="${#lists.isEmpty(pointItemInfo.members)}">
                    <td colspan="9">회원이 구매한 포인트 아이템이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
