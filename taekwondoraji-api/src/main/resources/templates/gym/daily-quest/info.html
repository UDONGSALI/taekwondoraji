<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{gym/fragments/layout :: layout('일퀘 관리', 'dailyquestinfo', ${gymId}, ~{::dailyQuestInfoContent})}">
<th:block th:fragment="dailyQuestInfoContent">
    <link rel="stylesheet" th:href="@{/css/admin/goal/common.css(v='4')}">

    <script th:if="${toastMessage != null}" th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof window.toastMsg === "function") {
                window.toastMsg([[${toastMessage}]], [[${toastType != null ? toastType : 'success'}]]);
            }
        });
    </script>

    <section class="content-panel panel-emphasis">
        <div class="panel-header">
            <h2>일퀘 등록</h2>
        </div>

        <form class="goal-create-form"
              th:action="@{/gym/{gymId}/daily-quest(gymId=${gymId})}"
              th:object="${dailyQuestCreateForm}"
              method="post">
            <div class="goal-create-grid">
                <label class="goal-field">
                    <span>날짜</span>
                    <input type="date" th:field="*{questDate}">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('questDate')}" th:errors="*{questDate}">오류</small>
                </label>

                <label class="goal-field">
                    <span>일퀘 이름</span>
                    <input type="text" th:field="*{name}" placeholder="일퀘 이름">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">오류</small>
                </label>

                <label class="goal-field">
                    <span>포인트</span>
                    <input type="number" th:field="*{point}" min="0" placeholder="0">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('point')}" th:errors="*{point}">오류</small>
                </label>

                <label class="goal-field goal-field-description">
                    <span>설명</span>
                    <input type="text" th:field="*{description}" placeholder="퀘스트 설명">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">오류</small>
                </label>

                <label class="goal-field goal-field-link">
                    <span>설명 링크</span>
                    <input type="text" th:field="*{link}" placeholder="https://example.com">
                    <small class="goal-field-error" th:if="${#fields.hasErrors('link')}" th:errors="*{link}">오류</small>
                </label>

                <div class="goal-field-action">
                    <button type="submit">입력</button>
                </div>
            </div>
        </form>
    </section>

    <section class="content-panel panel-emphasis">
        <div class="panel-header">
            <h2>일퀘 목록</h2>
        </div>

        <div class="summary-box">
            <table class="goal-table">
                <thead>
                <tr>
                    <th>No</th>
                    <th>날짜</th>
                    <th>이름</th>
                    <th>포인트</th>
                    <th>설명</th>
                    <th>링크</th>
                    <th>생성일시</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, iterStat : ${dailyQuestInfo.list}">
                    <td th:text="${iterStat.count}">1</td>
                    <td th:text="${item.questDate}">2026-05-17</td>
                    <td th:text="${item.name}">일퀘명</td>
                    <td th:text="${item.point}">100</td>
                    <td th:text="${item.description != null and !#strings.isEmpty(item.description) ? item.description : '-'}">설명</td>
                    <td>
                        <a th:if="${item.link != null and !#strings.isEmpty(item.link)}"
                           th:href="${item.link}"
                           target="_blank"
                           rel="noopener noreferrer"
                           class="goal-link">
                            보기
                        </a>
                        <span th:if="${item.link == null or #strings.isEmpty(item.link)}">-</span>
                    </td>
                    <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-17 00:00</td>
                    <td>
                        <form th:action="@{/gym/{gymId}/daily-quest/{dailyQuestId}/delete(gymId=${gymId}, dailyQuestId=${item.gymDailyQuestId})}"
                              method="post">
                            <button type="submit" class="goal-delete-button">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(dailyQuestInfo.list)}">
                    <td colspan="8">등록된 일퀘가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
