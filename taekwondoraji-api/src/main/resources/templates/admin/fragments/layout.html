<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, activeMenu, contentFragment)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">관리자 페이지</title>
    <link rel="stylesheet" th:href="@{/css/admin/common.css(v='5')}">
    <script th:src="@{/js/admin/common.js(v='1')}" defer></script>
</head>
<body class="admin-body">
<div class="admin-layout">
    <aside th:replace="~{admin/fragments/sidebar :: sidebar(${activeMenu})}"></aside>

    <main class="admin-content">
        <th:block th:replace="${contentFragment}"></th:block>
    </main>
</div>
</body>
</html>
