<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/fragments/layout :: layout('도장 정보 관리', 'gyminfo', ~{::gymInfoContent})}">
<th:block th:fragment="gymInfoContent">
    <link rel="stylesheet" th:href="@{/css/admin/gym/common.css(v='1')}">

    <section class="content-panel page-intro-panel">
        <div class="gym-info-overview">
            <div class="gym-info-intro">
                <div class="panel-header">
                    <h2>도장 정보 관리</h2>
                </div>

                <div class="hero-copy">
                    <p>운영 관리자 화면에서 전체 도장 현황을 확인하고, 각 도장 상세 화면으로 이동할 수 있습니다.</p>
                </div>
            </div>

            <div class="gym-info-summary-grid">
                <article class="info-card info-card-compact">
                    <h3>전체</h3>
                    <p th:text="${gymInfo.summary.totalCount}">0</p>
                </article>

                <article class="info-card info-card-compact">
                    <h3>대기</h3>
                    <p th:text="${gymInfo.summary.waitCount}">0</p>
                </article>

                <article class="info-card info-card-compact">
                    <h3>운영 중</h3>
                    <p th:text="${gymInfo.summary.activeCount}">0</p>
                </article>

                <article class="info-card info-card-compact">
                    <h3>중지</h3>
                    <p th:text="${gymInfo.summary.stopCount}">0</p>
                </article>
            </div>
        </div>
    </section>

    <section class="content-panel panel-emphasis">
        <div class="panel-header panel-header-row">
            <div>
                <h2>도장 목록</h2>
            </div>

            <form class="table-filter-form" th:action="@{/admin/gym/info}" th:object="${param}" method="get">
                <select th:field="*{serviceStatus}">
                    <option value="">상태 전체</option>
                    <option th:each="status : ${serviceStatuses}"
                            th:value="${status.name()}"
                            th:text="${status.label}">
                        상태
                    </option>
                </select>

                <select th:field="*{regionCode}">
                    <option value="">지역 전체</option>
                    <option th:each="region : ${regionOptions}"
                            th:value="${region.regionCode}"
                            th:text="${region.regionName}">
                        지역
                    </option>
                </select>

                <input type="text"
                       th:field="*{keyword}"
                       placeholder="도장명, 대표자명, 사업자번호 검색" />

                <button type="submit">검색</button>
                <a th:href="@{/admin/gym/info}" class="filter-reset">초기화</a>
            </form>
        </div>

        <div class="summary-box">
            <table class="gym-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>도장명</th>
                    <th>상태</th>
                    <th>사업자번호</th>
                    <th>대표자</th>
                    <th>전화번호</th>
                    <th>주소</th>
                    <th>지역</th>
                    <th>서비스 시작일</th>
                    <th>서비스 종료일</th>
                    <th>등록일시</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${gymInfo.list}">
                    <td th:text="${item.gymId}">1</td>
                    <td>
                        <a class="gym-name-link"
                           th:href="@{/admin/gym/detail/{gymId}(gymId=${item.gymId})}"
                           th:text="${item.gymName}">
                            도장명
                        </a>
                    </td>
                    <td th:text="${item.status}">운영 중</td>
                    <td th:text="${item.businessNumber}">1234567890</td>
                    <td th:text="${item.ownerName}">대표자</td>
                    <td th:text="${item.phoneNumber != null and !#strings.isEmpty(item.phoneNumber) ? item.phoneNumber : '-'}">010-0000-0000</td>
                    <td th:text="${item.address}">주소</td>
                    <td th:text="${item.regionName}">지역</td>
                    <td th:text="${item.serviceStartDate != null ? #temporals.format(item.serviceStartDate, 'yyyy-MM-dd') : '-'}">2026-04-01</td>
                    <td th:text="${item.serviceEndDate != null ? #temporals.format(item.serviceEndDate, 'yyyy-MM-dd') : '-'}">2026-12-31</td>
                    <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-12 00:42</td>
                </tr>
                <tr th:if="${#lists.isEmpty(gymInfo.list)}">
                    <td colspan="11">조회된 도장 정보가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
